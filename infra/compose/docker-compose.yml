# Local full-stack for Sephela backend foundation (Phase 2).
# Brings up Postgres, Redis, the API, and a Celery worker.
# Object storage (MinIO) + vector DB (Qdrant) are added in their phases.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sephela
      POSTGRES_PASSWORD: sephela
      POSTGRES_DB: sephela
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sephela"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../backend
    environment:
      SEPHELA_ENV: local
      SEPHELA_POSTGRES_HOST: postgres
      SEPHELA_REDIS_HOST: redis
      SEPHELA_LOG_JSON: "false"
    env_file:
      - ../../backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ../../backend
    environment:
      SEPHELA_ENV: local
      SEPHELA_POSTGRES_HOST: postgres
      SEPHELA_REDIS_HOST: redis
      SEPHELA_LOG_JSON: "false"
    env_file:
      - ../../backend/.env.example
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      --loglevel=INFO
      --queues=intake,static,code_intel,ai,dynamic,threat_intel,scoring,reporting,notify

volumes:
  pgdata:
